name: jass_app
description: "Jass Kartenspiel App mit Französischen und Deutschen Karten"
publish_to: 'none'

version: 1.5.2+2004

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  shared_preferences: ^2.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/cards/french/
    - assets/cards/german/
    - assets/suit_icons/
    - assets/jass_nn_weights.json
